name: JobBot

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "America/New_York"
    - cron: "0 9 * * *"
      timezone: "America/New_York"
    - cron: "0 10 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

jobs:
  run-jobbot:
    runs-on: ubuntu-latest

    env:
      JOBBOT_TELEGRAM_BOT_TOKEN: ${{ secrets.JOBBOT_TELEGRAM_BOT_TOKEN }}
      JOBBOT_TELEGRAM_CHAT_ID: ${{ secrets.JOBBOT_TELEGRAM_CHAT_ID }}
      JOBBOT_LINKEDIN_EMAIL: ${{ secrets.JOBBOT_LINKEDIN_EMAIL }}
      JOBBOT_LINKEDIN_PASSWORD: ${{ secrets.JOBBOT_LINKEDIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run JobBot
        run: |
          python -m jobbot run --config config.yaml
